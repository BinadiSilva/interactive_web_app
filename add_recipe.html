<section class="container mt-4">

<form>

<div class="mb-3">

<label class="form-label">Recipe Name :</label>
<input type="text" class="form-control" placeholder="Enter recipe name">

</div>

<div class="mb-3">

<label class="form-label">Category :</label>

<select class="form-select">

<option>Select</option>
<option>Breakfast</option>
<option>Lunch</option>
<option>Dinner</option>
<option>Dessert</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Ingredients :</label>

<textarea class="form-control" rows="4" placeholder="Enter each ingredient on a new line"></textarea>

</div>

<div class="mb-3">

<label class="form-label">Steps :</label>

<textarea class="form-control" rows="4" placeholder="Enter each step on a new line"></textarea>

</div>

<div class="mb-4">

<label class="form-label">Image URL :</label>
<input type="text" class="form-control" placeholder="Paste image URL">

</div>

<div class="text-center">

<button type="submit" class="btn btn-primary px-5">Submit</button>

</div>

</form>
