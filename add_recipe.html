<!-- PAGE CONTENT -->
<div class="container mt-5">

<h2 class="text-center mb-4">Add Recipe</h2>

<form id="recipeForm">

<div class="mb-3">
<label class="form-label">Recipe Name:</label>
<input type="text" class="form-control" id="name" required>
</div>

<div class="mb-3">
<label class="form-label">Category:</label>
<select class="form-control" id="category" required>
<option value="">Select Category</option>
<option>Breakfast</option>
<option>Lunch</option>
<option>Dinner</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Ingredients:</label>
<textarea class="form-control" rows="4" id="ingredients" required></textarea>
</div>

<div class="mb-3">
<label class="form-label">Steps:</label>
<textarea class="form-control" rows="4" id="steps" required></textarea>
</div>

<div class="mb-3">
<label class="form-label">Image URL (optional):</label>
<input type="text" class="form-control" id="image">
</div>

<div class="text-center">
<button type="submit" class="btn btn-outline-dark">
SUBMIT RECIPE
</button>
</div>

</form>

</div>

<script src="js/script.js"></script>

<!-- LOGIN CHECK -->
<script>

const loggedIn = localStorage.getItem("loggedIn");
const user = JSON.parse(localStorage.getItem("user"));

if (!loggedIn) {
alert("You must login first!");
window.location.href = "login.html";
} else {

if (user && document.getElementById("navUserName")) {
document.getElementById("navUserName").innerText = user.name;
}

}

function logout() {
localStorage.removeItem("loggedIn");
localStorage.removeItem("user");
window.location.href = "login.html";
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
