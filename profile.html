<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<link rel="stylesheet" href="css/styles.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.profile-box{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}
.profile-img{
width:100px;
border-radius:50%;
margin-bottom:15px;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">

<div class="container">

<a class="navbar-brand fw-bold" href="#">🍲 RecipeBook</a>

<ul class="navbar-nav ms-auto align-items-center">

<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="recipes.html">Browse Recipes</a></li>
<li class="nav-item"><a class="nav-link" href="add_recipe.html">Add Recipe</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>

<li class="nav-item d-none" id="profileNav">
<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" width="35">
</li>

</ul>

</div>

</nav>

<!-- PROFILE CONTENT -->

<div class="container mt-5">

<div class="profile-box">

<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-img">

<h3 id="profileName">User Name</h3>
<p id="profileEmail">user@email.com</p>

<button class="btn btn-danger mt-3" onclick="logout()">Logout</button>

</div>

</div>

<!-- FOOTER -->

<footer class="bg-dark text-white text-center mt-5 p-4">
<p>© 2026 Add & Bake. All rights reserved.</p>
</footer>

<script src="js/auth.js"></script>

<script>

/* LOAD USER DATA */

let user = JSON.parse(localStorage.getItem("user"));

if(user){
document.getElementById("profileName").innerText = user.name;
document.getElementById("profileEmail").innerText = user.email;
}

/* LOGOUT */

function logout(){
localStorage.removeItem("loggedIn");
alert("Logged out successfully!");
window.location = "login.html";
}

</script>

</body>
</html>
