<!-- PAGE TITLE -->

<h2>Contact Us</h2>
<hr>
</section>


<!-- CONTACT FORM -->
<section class="container mt-4">
<div class="row justify-content-center">
<div class="col-md-8">

<form id="contactForm">

<div class="mb-3">
<label class="form-label">Name :</label>
<input type="text" id="contactName" class="form-control" placeholder="Enter your name" required>
</div>

<div class="mb-3">
<label class="form-label">Email :</label>
<input type="email" id="contactEmail" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-4">
<label class="form-label">Message :</label>
<textarea id="contactMessage" class="form-control" rows="6" placeholder="Enter your message" required></textarea>
</div>

<div class="text-center">
<button type="submit" class="btn btn-primary px-5">Submit</button>
</div>

</form>

</div>
</div>
</section>

<!-- SCRIPTS -->
<script src="js/script.js"></script>

<script>

const loggedIn = localStorage.getItem("loggedIn");
const user = JSON.parse(localStorage.getItem("user"));

if (!loggedIn) {
alert("You must login first!");
window.location.href = "login.html";
} else {

if (user && document.getElementById("navUserName")) {
document.getElementById("navUserName").innerText = user.name;
}

}

function logout() {
localStorage.removeItem("loggedIn");
localStorage.removeItem("user");
window.location.href = "login.html";
}

</script>
